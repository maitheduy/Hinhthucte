<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam giác Sierpinski "Dát Vàng" Mặt Trụ</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #1a1a1a; color: #e0e0e0; overflow: hidden; }
        #container { display: flex; width: 100vw; height: 100vh; }
        #info-panel { flex: 0 0 45%; padding: 25px; background-color: #2c2c2c; overflow-y: auto; display: flex; flex-direction: column; }
        #canvas-container { flex-grow: 1; position: relative; }
        h1 { color: #4fc3f7; margin-top: 0; font-size: 1.5em; text-align: center; }
        p { line-height: 1.6; }
        #equations { background-color: #333; padding: 15px; border-radius: 8px; margin-top: auto; }
        .equation-title { margin-bottom: 0.2em; margin-top: 1.0em; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>
<div id="container">
    <div id="info-panel">
        <h1>Sierpinski "Dát" Mặt Trụ</h1>
        <p>Tam giác Sierpinski (IFS 3 hàm) được "dát" lên mặt trụ. Tham số <b>u</b> → góc θ, tham số <b>v</b> → chiều cao h.</p>
        <div id="equations"></div>
    </div>
    <div id="canvas-container"></div>
</div>

<script> MathJax = { tex: { inlineMath: [['$','$']] }, svg: { fontCache: 'global' } }; </script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.164.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/" } }</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const NUM_POINTS = 150000;
const R = 1.2;   // bán kính trụ
const H = 2.4;   // chiều cao trụ

// ── Hàm ánh xạ: (u,v) ∈ [0,1]² → mặt trụ ──────────────────────────
function to3D(u, v) {
    const theta = u * 2 * Math.PI;
    const y     = v * H - H / 2;      // v=0 → đáy, v=1 → đỉnh
    return { x: R * Math.cos(theta), y: y, z: R * Math.sin(theta) };
}

// ── Scene ────────────────────────────────────────────────────────────
const canvasContainer = document.getElementById('canvas-container');
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
const camera   = new THREE.PerspectiveCamera(60, canvasContainer.clientWidth / canvasContainer.clientHeight, 0.1, 100);
camera.position.set(3, 1.5, 3);
camera.lookAt(0, 0, 0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
canvasContainer.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ── Wireframe trụ nền ────────────────────────────────────────────────
const cylGeo = new THREE.CylinderGeometry(R, R, H, 48, 1, true);
scene.add(new THREE.Mesh(cylGeo,
    new THREE.MeshBasicMaterial({ color: 0x334455, wireframe: true, transparent: true, opacity: 0.2 })
));

// ── Ánh sáng ─────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

// ── Chaos Game — Sierpinski (3 hàm co, y chang mặt cầu) ─────────────
const pos1 = [], pos2 = [], pos3 = [];
let u = Math.random(), v = Math.random();

for (let i = 0; i < NUM_POINTS; i++) {
    const rand = Math.random();
    let nu, nv;

    if (rand < 1/3) {           // h1: co về góc (0, 0)
        nu = 0.5 * u;
        nv = 0.5 * v;
        if (i > 20) { const p = to3D(nu, nv); pos1.push(p.x, p.y, p.z); }
    } else if (rand < 2/3) {    // h2: co về góc (1, 0)
        nu = 0.5 * u + 0.5;
        nv = 0.5 * v;
        if (i > 20) { const p = to3D(nu, nv); pos2.push(p.x, p.y, p.z); }
    } else {                    // h3: co về góc (0, 1)
        nu = 0.5 * u;
        nv = 0.5 * v + 0.5;
        if (i > 20) { const p = to3D(nu, nv); pos3.push(p.x, p.y, p.z); }
    }
    u = nu; v = nv;
}

function makePoints(arr, color) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(arr, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({ color, size: 0.012 }));
}
scene.add(makePoints(pos1, 0x76ff03));   // xanh lá — h1
scene.add(makePoints(pos2, 0xff1744));   // đỏ     — h2
scene.add(makePoints(pos3, 0x2979ff));   // xanh   — h3

// ── MathJax ──────────────────────────────────────────────────────────
document.getElementById('equations').innerHTML = `
    <p class="equation-title">IFS Sierpinski (3 hàm co):</p>
    <div style="color:#76ff03">$h_1(u,v)=(0.5u,\\;0.5v)$</div>
    <div style="color:#ff1744">$h_2(u,v)=(0.5u+0.5,\\;0.5v)$</div>
    <div style="color:#2979ff">$h_3(u,v)=(0.5u,\\;0.5v+0.5)$</div>
    <p class="equation-title">Ánh xạ lên mặt trụ:</p>
    $S(u,v)=\\begin{cases}x=R\\cos(2\\pi u)\\\\y=vH-H/2\\\\z=R\\sin(2\\pi u)\\end{cases}$
    <p style="font-size:0.85em;color:#aaa;margin-top:8px;">R = ${R} &nbsp;|&nbsp; H = ${H} &nbsp;|&nbsp; N = ${NUM_POINTS.toLocaleString()} điểm</p>
`;
if (window.MathJax) MathJax.typesetPromise();

// ── Resize & Render loop ─────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
});

(function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
})();
</script>
</body>
</html>
